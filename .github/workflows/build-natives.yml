name: Build Native Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      electron_version:
        description: 'Electron version to build against'
        required: false
        default: '39.6.0'
      node_pty_version:
        description: 'node-pty version'
        required: false
        default: '1.1.0'

env:
  ELECTRON_VERSION: ${{ inputs.electron_version || '39.6.0' }}
  NODE_PTY_VERSION: ${{ inputs.node_pty_version || '1.1.0' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: win-x64
            runner: windows-latest
            triple: win32-x64
            files: 'node_modules/node-pty/build/Release/pty.node node_modules/node-pty/build/Release/winpty.dll node_modules/node-pty/build/Release/winpty-agent.exe'

          - name: mac-arm64
            runner: macos-latest
            triple: darwin-arm64
            files: 'node_modules/node-pty/build/Release/pty.node node_modules/node-pty/build/Release/spawn-helper'

          - name: mac-x64
            runner: macos-14
            triple: darwin-x64
            arch: x64
            files: 'node_modules/node-pty/build/Release/pty.node node_modules/node-pty/build/Release/spawn-helper'

          - name: linux-x64
            runner: ubuntu-latest
            triple: linux-x64
            files: 'node_modules/node-pty/build/Release/pty.node'

          - name: linux-arm64
            runner: ubuntu-24.04-arm
            triple: linux-arm64
            files: 'node_modules/node-pty/build/Release/pty.node'

    runs-on: ${{ matrix.runner }}
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install node-pty
        run: |
          npm init -y
          npm install node-pty@${{ env.NODE_PTY_VERSION }}
        env:
          npm_config_arch: ${{ matrix.arch || '' }}

      - name: Rebuild for Electron
        run: npx @electron/rebuild --version ${{ env.ELECTRON_VERSION }} --module-dir . --which-module node-pty ${{ matrix.arch && format('--arch {0}', matrix.arch) || '' }}

      - name: Ensure executable permissions (Unix)
        if: runner.os != 'Windows'
        run: |
          for f in ${{ matrix.files }}; do
            if [ -f "$f" ]; then
              chmod +x "$f"
            fi
          done

      - name: Stage files for packaging
        shell: bash
        run: |
          mkdir -p staging/build/Release staging/lib/shared staging/lib/worker
          # Copy native binary and platform-specific files
          for f in ${{ matrix.files }}; do
            if [ -f "$f" ]; then
              cp "$f" staging/build/Release/
            fi
          done
          # Copy node-pty JS files (needed for the full API)
          cp node_modules/node-pty/lib/*.js staging/lib/
          cp node_modules/node-pty/lib/shared/*.js staging/lib/shared/ 2>/dev/null || true
          cp node_modules/node-pty/lib/worker/*.js staging/lib/worker/ 2>/dev/null || true
          # Copy package.json (needed for require resolution)
          cp node_modules/node-pty/package.json staging/

      - name: Patch Windows conout for Electron compatibility
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Replace worker_threads-based ConoutConnection with inline pipe forwarding
          # Electron's renderer process doesn't support worker_threads
          cat > staging/lib/windowsConoutConnection.js << 'PATCH_EOF'
          "use strict";
          Object.defineProperty(exports, "__esModule", { value: true });
          exports.ConoutConnection = void 0;
          var net_1 = require("net");
          var conout_1 = require("./shared/conout");
          var eventEmitter2_1 = require("./eventEmitter2");
          var FLUSH_DATA_INTERVAL = 1000;
          var ConoutConnection = (function () {
              function ConoutConnection(_conoutPipeName, _useConptyDll) {
                  var _this = this;
                  this._conoutPipeName = _conoutPipeName;
                  this._useConptyDll = _useConptyDll;
                  this._isDisposed = false;
                  this._onReady = new eventEmitter2_1.EventEmitter2();
                  this._conoutSocket = new net_1.Socket();
                  this._conoutSocket.setEncoding('utf8');
                  this._conoutSocket.connect(_conoutPipeName, function () {
                      _this._server = net_1.createServer(function (workerSocket) {
                          _this._conoutSocket.pipe(workerSocket);
                      });
                      _this._server.listen(conout_1.getWorkerPipeName(_conoutPipeName));
                      _this._onReady.fire();
                  });
              }
              Object.defineProperty(ConoutConnection.prototype, "onReady", {
                  get: function () { return this._onReady.event; },
                  enumerable: false,
                  configurable: true
              });
              ConoutConnection.prototype.dispose = function () {
                  if (!this._useConptyDll && this._isDisposed) { return; }
                  this._isDisposed = true;
                  this._drainDataAndClose();
              };
              ConoutConnection.prototype.connectSocket = function (socket) {
                  socket.connect(conout_1.getWorkerPipeName(this._conoutPipeName));
              };
              ConoutConnection.prototype._drainDataAndClose = function () {
                  var _this = this;
                  if (this._drainTimeout) { clearTimeout(this._drainTimeout); }
                  this._drainTimeout = setTimeout(function () { return _this._destroySocket(); }, FLUSH_DATA_INTERVAL);
              };
              ConoutConnection.prototype._destroySocket = function () {
                  if (this._server) { this._server.close(); }
                  if (this._conoutSocket) { this._conoutSocket.destroy(); }
              };
              return ConoutConnection;
          }());
          exports.ConoutConnection = ConoutConnection;
          PATCH_EOF

      - name: Package zip
        shell: bash
        run: |
          cd staging
          7z a ../node-pty-${{ matrix.triple }}.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-pty-${{ matrix.triple }}
          path: node-pty-${{ matrix.triple }}.zip

  build-plugin:
    runs-on: ubuntu-latest
    name: Build plugin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: node esbuild.config.mjs production

      - name: Upload plugin assets
        uses: actions/upload-artifact@v4
        with:
          name: plugin-assets
          path: |
            main.js
            manifest.json
            styles.css

  release:
    needs: [build, build-plugin]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          echo '{' > checksums.json
          first=true
          for f in *.zip; do
            hash=$(sha256sum "$f" | cut -d' ' -f1)
            if [ "$first" = true ]; then
              first=false
            else
              echo ',' >> checksums.json
            fi
            printf '  "%s": "%s"' "$f" "$hash" >> checksums.json
          done
          echo '' >> checksums.json
          echo '}' >> checksums.json
          cat checksums.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
            artifacts/checksums.json
            artifacts/main.js
            artifacts/manifest.json
            artifacts/styles.css
          generate_release_notes: true
